<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ibis Legacy Law — Monday.com Workflow Navigator</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0F6E56;
  --teal-lt:#E6F4F0;
  --teal-md:#C2E5DC;
  --navy:#1B3A6B;
  --navy-lt:#EEF2F9;
  --s:#ffffff;
  --s2:#F7F8FC;
  --s3:#EEF0F7;
  --bd:#E3E7F0;
  --bd2:#C9D0E8;
  --t1:#111827;
  --t2:#374151;
  --t3:#6B7280;
  --t4:#9CA3AF;
  --r:7px;
  --rl:11px;
  --shadow-sm:0 1px 3px rgba(17,24,39,.07),0 1px 2px rgba(17,24,39,.04);
  --shadow-md:0 4px 12px rgba(17,24,39,.09),0 2px 6px rgba(17,24,39,.05);
  --shadow-lg:0 8px 24px rgba(17,24,39,.10),0 4px 10px rgba(17,24,39,.06);
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}

body{
  font-family:var(--font);
  font-size:14px;
  color:var(--t1);
  background:#ECEEF5;
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(15,110,86,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(27,58,107,.06) 0%,transparent 50%);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  margin:0;
  padding:1.5rem 1rem 3rem;
}
.wrap{max-width:880px;margin:0 auto}

/* ── Header ── */
.hdr{
  display:flex;align-items:center;gap:14px;
  padding:.875rem 1.25rem;
  background:var(--s);
  border:1px solid var(--bd);
  border-radius:var(--rl);
  margin-bottom:1rem;
  box-shadow:var(--shadow-sm);
}
.hdr-logo{height:44px;width:auto;object-fit:contain;flex-shrink:0}
.hdr-fb{
  width:38px;height:38px;border-radius:var(--r);
  background:var(--navy);display:none;align-items:center;
  justify-content:center;color:#fff;font-size:17px;flex-shrink:0;
}
.hdr-text{flex:1;min-width:0}
.hdr-text h1{
  font-size:14px;font-weight:600;color:var(--t1);
  letter-spacing:-.015em;line-height:1.3;
}
.hdr-text p{font-size:11px;color:var(--t3);margin-top:2px;letter-spacing:.01em}
.hdr-pills{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.hdr-pill{
  font-size:11px;padding:3px 9px;border-radius:20px;
  border:1px solid var(--bd);color:var(--t2);background:var(--s2);
  display:flex;align-items:center;gap:4px;white-space:nowrap;
  font-weight:500;
}

/* ── App shell ── */
.app{
  background:var(--s);
  border:1px solid var(--bd);
  border-radius:var(--rl);
  overflow:hidden;
  box-shadow:var(--shadow-md);
}
.app-layout{display:grid;grid-template-columns:196px 1fr;min-height:640px}

/* ── Sidebar ── */
.sb{
  border-right:1px solid var(--bd);
  background:var(--s2);
  padding:12px 0 0;
  display:flex;flex-direction:column;
  position:relative;
}
.sb-bottom{
  margin-top:auto;padding:12px 14px 14px;
  border-top:1px solid var(--bd);
  font-size:10px;color:var(--t4);font-weight:500;
  letter-spacing:.02em;
  display:flex;align-items:center;gap:6px;
}
.sb-bottom-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}
.sb-grp-lbl{
  font-size:10px;font-weight:600;color:var(--t4);
  text-transform:uppercase;letter-spacing:.08em;
  padding:10px 14px 5px;
}
.sb-item{
  display:flex;align-items:center;gap:9px;width:100%;
  padding:7px 14px 7px 16px;
  font-size:12.5px;font-weight:500;color:var(--t2);
  background:none;border:none;cursor:pointer;
  font-family:var(--font);text-align:left;
  transition:color .12s,background .12s;
  position:relative;letter-spacing:-.01em;
}
.sb-item i{font-size:14px;flex-shrink:0;color:var(--t4);transition:color .12s}
.sb-item:hover{color:var(--t1);background:rgba(0,0,0,.03)}
.sb-item:hover i{color:var(--t3)}
.sb-item.on{color:var(--teal);background:var(--teal-lt);font-weight:600}
.sb-item.on i{color:var(--teal)}
.sb-item.on::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:2.5px;background:var(--teal);border-radius:0 2px 2px 0;
}
.sb-sep{height:1px;background:var(--bd);margin:8px 14px}

/* ── Pane ── */
.pane{padding:1.25rem;overflow:hidden}

/* ── Search ── */
.srch-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);
  border:1px solid var(--bd);border-radius:var(--r);
  padding:7px 12px;margin-bottom:10px;
  transition:border-color .15s,box-shadow .15s;
}
.srch-wrap:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.srch-wrap input{
  border:none;background:transparent;color:var(--t1);
  font-size:13px;outline:none;width:100%;
  font-family:var(--font);letter-spacing:-.01em;
}
.srch-wrap input::placeholder{color:var(--t4)}
.srch-wrap i{color:var(--t4);font-size:15px;flex-shrink:0}
.srch-clear{background:none;border:none;cursor:pointer;color:var(--t4);padding:0;display:flex;align-items:center;font-size:14px;transition:color .1s}
.srch-clear:hover{color:var(--t1)}

/* ── Filter chips ── */
.chips-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.chip-btn{
  padding:3px 10px;font-size:11px;font-weight:500;
  border-radius:20px;border:1px solid var(--bd);
  cursor:pointer;color:var(--t2);background:var(--s);
  font-family:var(--font);transition:border-color .1s,color .1s,background .1s;
  white-space:nowrap;letter-spacing:-.005em;
}
.chip-btn:hover{border-color:var(--bd2);color:var(--t1)}
.chip-btn.on{color:#fff;border-color:transparent}

/* ── Stage headers ── */
.sg-hdr{display:flex;align-items:center;gap:7px;margin:16px 0 7px}
.sg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sg-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.sg-ct{font-size:10px;color:var(--t4);font-weight:400}
.sg-line{flex:1;height:1px;background:var(--bd)}

/* ── Event rows ── */
.ev{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:var(--r);
  border:1px solid var(--bd);border-left-width:3px;
  background:var(--s);cursor:pointer;margin-bottom:4px;
  font-family:var(--font);width:100%;text-align:left;
  transition:background .1s,border-color .1s,box-shadow .1s;
  box-shadow:var(--shadow-sm);
}
.ev:hover{background:var(--s2);border-color:var(--bd2);box-shadow:var(--shadow-md)}
.ev-n{
  font-size:10px;min-width:19px;height:19px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:600;flex-shrink:0;font-family:var(--mono);
}
.ev-lbl{flex:1;font-size:12.5px;font-weight:500;color:var(--t1);line-height:1.35;text-align:left;letter-spacing:-.01em}
.ev-pre{
  font-size:10px;padding:1px 6px;border-radius:20px;
  background:#FEF3C7;color:#92400E;font-weight:600;
  flex-shrink:0;border:1px solid #FDE68A;
}
.ev-ft{font-size:10px;padding:1px 7px;border-radius:20px;color:#fff;font-weight:500;flex-shrink:0}
.count-note{font-size:11px;color:var(--t3);margin-bottom:8px;font-weight:500;letter-spacing:.01em}

/* ── Legend ── */
.legend{
  background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--r);padding:10px 14px;margin-bottom:12px;
}
.legend-ttl{font-size:10px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.legend-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;align-items:center}
.legend-row:last-child{margin-bottom:0}
.legend-lbl{font-size:10px;color:var(--t4);margin-right:4px;font-weight:500}
.lbadge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;color:#fff;display:inline-block;letter-spacing:.01em}
.lchip{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;color:#fff;display:inline-block;margin:1px}

/* ── Detail panel ── */
.back{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;color:var(--t2);background:none;border:none;
  cursor:pointer;padding:0;margin-bottom:12px;
  font-family:var(--font);font-weight:500;
  transition:color .1s;
}
.back:hover{color:var(--teal)}
.prog-bar-wrap{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:var(--s2);
  border-radius:var(--r);border:1px solid var(--bd);margin-bottom:12px;
}
.prog-track{flex:1;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s ease}
.prog-lbl{font-size:11px;color:var(--t3);font-weight:500;white-space:nowrap;font-family:var(--mono)}
.det-card{border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow-md)}
.det-head{padding:1rem 1.25rem;border-bottom:1px solid var(--bd)}
.det-title{font-size:15px;font-weight:600;color:var(--t1);line-height:1.4;letter-spacing:-.02em}

/* ── Where to click ── most prominent element in detail panel ── */
.click-block{
  border-radius:var(--r);
  padding:12px 15px 12px 18px;margin-bottom:10px;
  position:relative;overflow:hidden;
  border:1.5px solid transparent;
}
.click-block::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;border-radius:0;
}
.click-block-lbl{
  font-size:10px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px;
  display:flex;align-items:center;gap:5px;
}
.click-block-val{
  font-size:15px;font-weight:700;line-height:1.3;letter-spacing:-.02em;
}

.det-divider{height:1px;background:var(--bd);margin:10px 0}
.det-section-lbl{font-size:9.5px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;margin-top:2px}
.det-body{padding:1.25rem}
.iblock{
  background:var(--s2);border-radius:var(--r);
  padding:9px 12px;margin-bottom:8px;border:1px solid var(--bd);
}
.iblock-lbl{
  font-size:10px;font-weight:600;color:var(--t4);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;
}
.iblock-val{font-size:13px;color:var(--t1);font-weight:500;line-height:1.4;letter-spacing:-.01em}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

/* ── Signal boxes ── */
.signal{border-radius:var(--r);padding:10px 13px;margin-bottom:8px;font-size:12.5px;line-height:1.7;letter-spacing:-.01em}
.signal.pre{background:#FFFBEB;border:1px solid #FDE68A;color:#78350F}
.signal.go{background:#F0FDF4;border:1px solid #BBF7D0;color:#14532D}
.signal.nxt{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E3A5F}
.signal.wrn{background:#FFF7ED;border:1px solid #FED7AA;color:#7C2D12}
.signal-ttl{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:5px;
  display:flex;align-items:center;gap:5px;opacity:.7;
}
.signal ul{margin:3px 0 0 16px}
.signal li{margin-bottom:3px}

/* ── Flags ── */
.flag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.flag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;padding:3px 9px;border-radius:20px;
  font-weight:500;border:1px solid;
}
.staff-chip{
  display:inline-flex;align-items:center;
  font-size:11px;padding:2px 9px;border-radius:20px;
  font-weight:500;color:#fff;margin:2px;
}

/* ── What happened ── */
.wh-hero{
  background:linear-gradient(135deg,var(--teal-lt) 0%,var(--s) 100%);
  border:1px solid var(--teal-md);
  border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem;
}
.wh-hero-ttl{
  font-size:11px;font-weight:700;color:var(--teal);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.wh-inp-wrap{
  display:flex;align-items:center;gap:9px;
  background:var(--s);border:1px solid var(--bd2);
  border-radius:var(--r);padding:9px 13px;
  transition:border-color .15s,box-shadow .15s;
  box-shadow:var(--shadow-sm);
}
.wh-inp-wrap:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,110,86,.12)}
.wh-inp-wrap input{
  border:none;background:transparent;color:var(--t1);
  font-size:13px;outline:none;width:100%;
  font-family:var(--font);font-weight:500;letter-spacing:-.01em;
}
.wh-inp-wrap input::placeholder{color:var(--t4);font-weight:400}
.wh-hint{font-size:11px;color:var(--t2);margin-top:7px;opacity:.75}
.wh-suggestions{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.wh-sug{
  font-size:11px;padding:3px 10px;border-radius:20px;
  border:1px solid var(--teal-md);color:var(--teal);
  background:rgba(15,110,86,.05);cursor:pointer;
  font-family:var(--font);font-weight:500;
  transition:background .1s,border-color .1s;
}
.wh-sug:hover{background:var(--teal-lt);border-color:var(--teal)}
.wh-result{
  background:var(--s);border:1px solid var(--bd);
  border-radius:var(--rl);padding:1rem;margin-bottom:8px;
  border-top-width:3px;box-shadow:var(--shadow-sm);
  transition:box-shadow .1s;
}
.wh-result:hover{box-shadow:var(--shadow-md)}
.wh-result-hdr{display:flex;align-items:center;gap:7px;margin-bottom:9px;flex-wrap:wrap}
.wh-peek-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;padding:5px 11px;border-radius:var(--r);
  border:1px solid var(--bd2);cursor:pointer;
  background:var(--s2);color:var(--t2);
  font-family:var(--font);font-weight:500;margin-top:4px;
  transition:border-color .1s,color .1s,background .1s;
}
.wh-peek-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-lt)}

/* ── Quick ref ── */
.qr-stage{margin-bottom:1.25rem}
.qr-hdr{
  display:flex;align-items:center;gap:8px;
  padding:7px 12px;border-radius:var(--r);color:#fff;
  font-size:12px;font-weight:600;margin-bottom:5px;
  letter-spacing:-.01em;
}
.qr-row{
  display:flex;align-items:center;gap:7px;padding:6px 10px;
  border-radius:var(--r);border:1px solid var(--bd);border-left-width:3px;
  background:var(--s);margin-bottom:3px;cursor:pointer;
  font-family:var(--font);width:100%;text-align:left;
  transition:background .1s,box-shadow .1s;box-shadow:var(--shadow-sm);
}
.qr-row:hover{background:var(--s2);box-shadow:var(--shadow-md)}
.qr-n{
  font-size:10px;min-width:17px;height:17px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:600;flex-shrink:0;font-family:var(--mono);
}
.qr-ev{flex:1;font-size:12px;color:var(--t1);font-weight:500;letter-spacing:-.01em}

/* ── Concepts / Rules / Mistakes / TS ── */
.concept{
  background:var(--s);border:1px solid var(--bd);
  border-radius:var(--rl);padding:1rem 1.25rem;
  margin-bottom:8px;box-shadow:var(--shadow-sm);
}
.concept-n{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:var(--navy);color:#fff;font-size:11px;
  font-weight:600;margin-bottom:7px;font-family:var(--mono);
}
.concept-ttl{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px;letter-spacing:-.015em}
.concept-def{font-size:12.5px;color:var(--t2);line-height:1.7;margin-bottom:8px}
.concept-ex{background:var(--s2);border-radius:var(--r);padding:7px 11px;border:1px solid var(--bd)}
.concept-ex-lbl{
  font-size:10px;font-weight:600;color:var(--t4);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;
}
.concept-ex-val{font-size:11.5px;color:var(--t2);line-height:1.6;font-family:var(--mono)}
.rule{
  display:flex;gap:10px;padding:10px 14px;
  background:var(--s);border:1px solid var(--bd);
  border-radius:var(--r);margin-bottom:6px;
  box-shadow:var(--shadow-sm);
}
.rule-n{
  min-width:24px;height:24px;border-radius:50%;
  background:var(--teal);color:#fff;
  font-size:11px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;font-family:var(--mono);
}
.rule-t{font-size:12.5px;font-weight:600;color:var(--t1);margin-bottom:2px;letter-spacing:-.015em}
.rule-d{font-size:12.5px;color:var(--t2);line-height:1.65}
.mk{
  background:var(--s);border:1px solid var(--bd);border-left-width:3px;
  border-radius:var(--r);padding:9px 13px;margin-bottom:5px;
  box-shadow:var(--shadow-sm);
}
.mk-ev{
  font-size:10px;font-weight:600;color:var(--t4);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;
}
.mk-tx{font-size:12.5px;color:#B91C1C;line-height:1.55;font-weight:500;letter-spacing:-.01em}
.ts{
  background:var(--s);border:1px solid var(--bd);
  border-radius:var(--r);padding:10px 14px;margin-bottom:6px;
  box-shadow:var(--shadow-sm);
}
.ts-p{
  font-size:12.5px;font-weight:600;color:var(--t1);
  display:flex;align-items:center;gap:6px;margin-bottom:7px;
  letter-spacing:-.015em;
}
.ts-g{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ts-c{background:var(--s2);border-radius:var(--r);padding:7px 10px;border:1px solid var(--bd)}
.ts-cl{
  font-size:10px;font-weight:600;color:var(--t4);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;
}
.ts-cv{font-size:12px;color:var(--t2);line-height:1.55}

/* ── Utility ── */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--t4)}
.empty i{font-size:28px;display:block;margin-bottom:8px;opacity:.3}
.info-note{
  font-size:12px;color:var(--t3);padding:8px 12px;
  background:var(--s2);border-radius:var(--r);border:1px solid var(--bd);
  margin-bottom:14px;display:flex;align-items:center;gap:7px;
}
.footer{text-align:center;font-size:11px;color:var(--t4);margin-top:1.25rem;font-weight:500;letter-spacing:.02em}

/* ── Print styles ── */
@media print{
  body{background:#fff;padding:0}
  .wrap{max-width:100%}
  .hdr,.app,.footer{box-shadow:none;border:none}
  .sb{display:none}
  .app-layout{grid-template-columns:1fr}
  .app{border:none}
}

/* ── Responsive ── */
@media(max-width:680px){
  body{padding:1rem .5rem 2rem}
  .app-layout{grid-template-columns:1fr}
  .sb{border-right:none;border-bottom:1px solid var(--bd)}
  .hdr-pills{display:none}
  .igrid{grid-template-columns:1fr}
  .ts-g{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">

<div class="hdr">
  <img class="hdr-logo"
    src="https://www.ibislegacylaw.com/wp-content/uploads/2022/09/Ibis-Legacy-Law-Logo.png"
    alt="Ibis Legacy Law"
    onerror="this.style.display='none';document.getElementById('hfb').style.display='flex'">
  <div id="hfb" class="hdr-fb"><i class="ti ti-scale"></i></div>

  {id:5,sg:'lead',st:5,ev:'Consult date is being entered',fi:'Consult Date Column',ft:'column',va:'Manually input date',au:'N/A — data entry only. This date drives all 48-hour reminder automations and the 24-hour staff reminder. Must be entered BEFORE changing substatus to Consult Scheduled.',no:'N/A',ro:[],em:false,ds:'Consult Date',mi:'Forgetting to enter Consultation Date BEFORE changing substatus — all reminders depend on this date',pre:[],nx:'After entering the date, change the Consultation subitem to Consult Scheduled.'},

  {id:7,sg:'lead',st:7,ev:'48-hour consultation reminder fires (date-driven)',fi:'Consultation Date — automatic',ft:'auto',va:'Automatic',au:'Fires 48 hours before Consultation Date. Sends email — 4 variants: individual with questionnaire complete, individual without questionnaire, couple with questionnaire complete, couple without questionnaire. Sheila Scanlon notified 24 hours before to provide questionnaire to attorney.',no:'Sheila (Sheila Scanlon) — 24hr staff reminder',ro:['Sheila (Sheila Scanlon)'],em:true,ds:'Based on Consultation Date',mi:'Wrong or missing Consultation Date causes wrong timing or no reminder at all',pre:['Consultation Date must be entered before changing substatus to Consult Scheduled.'],nx:'Conduct the consultation. Afterward change the Consultation subitem to Consult Completed.'},

  {id:14,sg:'fee',st:2,ev:'Fee Agreement sent to Becky for review',fi:'Fee Agreement subitem',ft:'substatus',va:'RYP Reviewing',au:'Substatus → RYP Reviewing while in FEE AGREEMENT: notifies Rebecca Price (Becky); creates update; stamps Date RYP Notified to Review Fee Agt. Draft to today; sets Status to RYP REVIEWING FEE AGT. Date-driven: when Date RYP Notified to Review Fee Agt. Draft arrives and Status is not FEE AGT. SENT TO CLIENT FOR REVIEW (or other post-review statuses), Becky is automatically reminded the review is still waiting.',no:'Becky (Rebecca Price)',ro:['Becky (Rebecca Price)'],em:false,ds:'Date RYP Notified to Review Fee Agt. Draft',mi:'Using the wrong substatus name — the substatus is RYP Reviewing, not RYP Reviewing Fee Agt. or RYP Reviewing EP Drafts. The same substatus name behaves differently depending on which group the matter is in.',pre:['Fee Agreement draft must be ready for Becky\'s review before triggering.'],nx:'Becky reviews. If revisions needed → Needs Revisions. If approved → Fee Agt. Ready for Client Review. Note: EMM Reviewing and RYP Reviewing are independent — neither is a prerequisite for the other.'},
  {id:140,sg:'fee',st:3,ev:'Fee Agreement sent to Eric for review',fi:'Fee Agreement subitem',ft:'substatus',va:'EMM Reviewing',au:'Substatus → EMM Reviewing while in FEE AGREEMENT: sets Status to EMM REVIEWING FEE AGT. Status change to EMM REVIEWING FEE AGT. then notifies Eric Meleney and creates an update.',no:'Eric',ro:['Eric'],em:false,ds:null,mi:'Changing the substatus without the draft being ready — the status change and Eric notification fire immediately on trigger',pre:['Fee Agreement draft must be complete and ready for Eric\'s review before triggering.'],nx:'Eric reviews. If revisions needed → Needs Revisions. Note: EMM Reviewing and RYP Reviewing are independent — Becky\'s review via RYP Reviewing can occur separately and does not require Eric to go first.'},

  {id:18,sg:'fee',st:7,ev:'Fee Agreement sent to client for review',fi:'Fee Agreement subitem',ft:'substatus',va:'Fee Agt. Sent to Client for Review',au:'Substatus → Fee Agt. Sent to Client for Review: moves to FEE AGREEMENT group; sets Status to FEE AGT. SENT TO CLIENT FOR REVIEW. Status change: creates Update Client Snapshot subitem; notifies Eric Meleney; sends client email with Fee Agreement attached (individual or couple); stamps Date Fee Agt. Sent to Client for Review; stamps Fee Agt. Sent For Review Email Sent flag. Date-driven: 2-week client check-in and 1-month Sheila check-in fire automatically.',no:'Eric',ro:['Eric'],em:true,ds:'Date Fee Agt. Sent to Client for Review; Fee Agt. Sent For Review Email Sent flag',mi:'Sending before Fee Agreement is uploaded to the Fee Agreement Column — email sends without the attachment',pre:['Fee Agreement must be uploaded to the Fee Agreement Column before triggering.'],nx:'Await client approval. 2-week client check-in and 1-month staff check-in to Sheila fire automatically. When client approves → Fee Agt. Ready to Sign.'},

var tab='nav',sgF='all',roleF='All roles',selId=null,srch='',wh='';

/* ── Helpers ── */
function sgOf(id){return SG.find(function(s){return s.id===id;})||{lbl:'',c:'#546E7A'};}
function ftOf(k){return FT[k]||FT.auto;}
function totSg(sg){return EV.filter(function(e){return e.sg===sg;}).length;}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function filtered(){
  var q=srch.toLowerCase();
  return EV.filter(function(e){
    if(sgF!=='all'&&e.sg!==sgF)return false;
    if(roleF!=='All roles'&&e.ro.indexOf(roleF)===-1)return false;
    if(!q)return true;
    return[e.ev,e.fi,e.va,e.au,e.no,e.nx,e.mi].some(function(f){return(f||'').toLowerCase().indexOf(q)!==-1;});
  });
}

function expandQ(raw){
  var q=raw.toLowerCase().trim();var terms=[q];
  Object.keys(SYNONYMS).forEach(function(k){
    var vals=SYNONYMS[k];
    if(q.indexOf(k)!==-1)vals.forEach(function(v){if(terms.indexOf(v)===-1)terms.push(v);});
    vals.forEach(function(v){if(q.indexOf(v)!==-1){if(terms.indexOf(k)===-1)terms.push(k);vals.forEach(function(v2){if(terms.indexOf(v2)===-1)terms.push(v2);});}});
    if(k.indexOf(q)!==-1||q.indexOf(k)!==-1){if(terms.indexOf(k)===-1)terms.push(k);vals.forEach(function(v){if(terms.indexOf(v)===-1)terms.push(v);});}
  });
  return terms;
}

function whFiltered(){
  var raw=wh.toLowerCase().trim();
  if(raw.length<2)return[];
  var terms=expandQ(raw);
  function flds(e){return[e.ev,e.va,e.au,e.nx,e.fi,e.mi,e.no].map(function(f){return(f||'').toLowerCase();}).join(' ');}
  var scored=EV.map(function(e){
    var score=terms.reduce(function(s,t){return s+(flds(e).indexOf(t)!==-1?1:0);},0);
    return{e:e,score:score};
  }).filter(function(x){return x.score>0;});
  scored.sort(function(a,b){return b.score-a.score;});
  return scored.map(function(x){return x.e;});
}

function chipH(c,t){return'<span class="lchip" style="background:'+c+'">'+t+'</span>';}
function staffChip(s){
  var k=Object.keys(STAFF).find(function(k){return s.toLowerCase().indexOf(k.split(' ')[0].toLowerCase())!==-1;});
  return'<span class="staff-chip" style="background:'+(k?STAFF[k]:'#546E7A')+'">'+s+'</span>';
}
function nChips(s){
  if(!s||s==='N/A'||s.indexOf('No one')===0)return'<span style="font-size:11px;color:var(--t4)">'+(s||'N/A')+'</span>';
  return s.split(/[\/,]/).map(function(p){return p.trim();}).filter(Boolean).map(staffChip).join('');
}
function aLbl(e){
  var ft=ftOf(e.ft);
  if(e.ft==='substatus'||e.ft==='status'){
    var c=sC(e.va)||ft.bg;
    return'<span style="font-size:12px;color:var(--t2)">'+(e.ft==='substatus'?'Change substatus to':'Change status to')+'</span> <span class="lbadge" style="background:'+c+'">'+e.va+'</span>';
  }
  if(e.ft==='column')return'<span class="lbadge" style="background:'+ft.bg+'">'+ft.l+'</span><span style="font-size:12px;color:var(--t2);margin-left:5px">— '+e.va+'</span>';
  return'<span class="lbadge" style="background:'+ft.bg+'">'+ft.l+'</span>';
}

/* ── Render ── */
function render(){buildSB();buildPane();}
function setTab(t){tab=t;selId=null;srch='';wh='';render();}
function setSg(v){sgF=v;selId=null;render();}
function setRole(v){roleF=v;selId=null;render();}

function buildSB(){
  var nav=[
    {g:'Reference',items:[{id:'nav',icon:'ti-list-search',l:'Workflow navigator'},{id:'wh',icon:'ti-timeline-event',l:'What just happened?'},{id:'qr',icon:'ti-layout-list',l:'Quick reference'}]},
    {g:'Learn',items:[{id:'concepts',icon:'ti-book',l:'Key concepts'},{id:'rules',icon:'ti-shield-check',l:'Core rules'}]},
    {g:'Fix',items:[{id:'mistakes',icon:'ti-alert-triangle',l:'Common mistakes'},{id:'ts',icon:'ti-tool',l:'Troubleshooting'}]},
  ];
  document.getElementById('SB').innerHTML=nav.map(function(g){
    return'<div class="sb-grp-lbl">'+g.g+'</div>'+g.items.map(function(i){
      return'<button class="sb-item'+(tab===i.id?' on':'')+'" onclick="setTab(\''+i.id+'\')"><i class="ti '+i.icon+'"></i>'+i.l+'</button>';
    }).join('')+'<div class="sb-sep"></div>';
  }).join('')+'<div class="sb-bottom"><div class="sb-bottom-dot"></div>110 automations · 65 events</div>';
}

function buildLegend(){
  return'<div class="legend"><div class="legend-ttl">Color legend</div>'
    +'<div class="legend-row"><span class="legend-lbl">Action type</span>'+Object.values(FT).map(function(v){return'<span class="lbadge" style="background:'+v.bg+'">'+v.l+'</span>';}).join('')+'</div>'
    +'<div class="legend-row"><span class="legend-lbl">Stage</span>'+SG.map(function(s){return'<span class="lbadge" style="background:'+s.c+'">'+s.lbl+'</span>';}).join('')+'</div>'
    +'<div class="legend-row"><span class="legend-lbl">Staff</span>'+Object.entries(STAFF).map(function(e){return chipH(e[1],e[0]);}).join('')+'</div></div>';
}

function buildPane(){
  var p=document.getElementById('PANE');
  if(tab==='nav')p.innerHTML=buildNav();
  else if(tab==='wh')p.innerHTML=buildWH();
  else if(tab==='qr')p.innerHTML=buildQR();
  else if(tab==='concepts')p.innerHTML=buildConcepts();
  else if(tab==='rules')p.innerHTML=buildRules();
  else if(tab==='mistakes')p.innerHTML=buildMistakes();
  else p.innerHTML=buildTS();
  attachEv();
}

function buildNav(){
  if(selId){var e=EV.find(function(x){return x.id===selId;});if(!e){selId=null;return buildNav();}return buildDetail(e);}
  var list=filtered();
  var h=buildLegend();
  h+='<div class="chips-row"><button class="chip-btn'+(sgF==='all'?' on':'')+'" style="'+(sgF==='all'?'background:var(--teal);color:#fff;border-color:var(--teal)':'')+'" data-sg="all">All stages</button>';
  SG.forEach(function(s){var on=sgF===s.id;h+='<button class="chip-btn'+(on?' on':'')+'" style="'+(on?'background:'+s.c+';color:#fff;border-color:'+s.c:'')+'" data-sg="'+s.id+'">'+s.lbl+'</button>';});
  h+='</div><div class="chips-row">';
  ROLES.forEach(function(r){var on=roleF===r;var col=STAFF[r];h+='<button class="chip-btn'+(on?' on':'')+'" style="'+(on&&col?'background:'+col+';color:#fff;border-color:'+col:on?'background:var(--teal);color:#fff;border-color:var(--teal)':'')+'" data-role="'+escH(r)+'">'+r+'</button>';});
  h+='</div>';
  h+='<div class="srch-wrap"><i class="ti ti-search"></i><input type="text" id="srchIn" placeholder="Search events, staff, values, descriptions…" value="'+escH(srch)+'" oninput="onSrch(this.value)">'+(srch?'<button class="srch-clear" onclick="clrSrch()"><i class="ti ti-x"></i></button>':'')+'</div>';
  h+='<div class="count-note" id="cntEl">'+list.length+' event'+(list.length===1?'':'s')+'</div>';
  h+='<div id="evList">'+buildEvList(list)+'</div>';
  return'<div class="pane">'+h+'</div>';
}

function buildEvList(list){
  if(!list.length)return'<div class="empty"><i class="ti ti-search"></i>No events match your filters.</div>';
  var h='';
  if(sgF==='all'){
    SG.forEach(function(s){
      var items=list.filter(function(e){return e.sg===s.id;});
      if(!items.length)return;
      h+='<div class="sg-hdr"><div class="sg-dot" style="background:'+s.c+'"></div><div class="sg-lbl" style="color:'+s.c+'">'+s.lbl+'</div><div class="sg-ct">'+items.length+' events</div><div class="sg-line"></div></div>';
      items.forEach(function(e){h+=evRow(e,s);});
    });
  }else{list.forEach(function(e){h+=evRow(e,sgOf(e.sg));});}
  return h;
}

function evRow(e,s){
  var ft=ftOf(e.ft);var hasPre=e.pre&&e.pre.length>0;
  return'<button class="ev" data-ev="'+e.id+'" style="border-left-color:'+s.c+'"><span class="ev-n" style="background:'+s.c+'">'+e.st+'</span><span class="ev-lbl">'+e.ev+'</span>'+(hasPre?'<span class="ev-pre"><i class="ti ti-alert-triangle" style="font-size:9px;margin-right:2px"></i>prereqs</span>':'')+'<span class="ev-ft" style="background:'+ft.bg+'">'+ft.l+'</span></button>';
}

function onSrch(v){
  srch=v;
  var list=filtered();
  var c=document.getElementById('cntEl');
  var l=document.getElementById('evList');
  if(c)c.textContent=list.length+' event'+(list.length===1?'':'s');
  if(l){l.innerHTML=buildEvList(list);attachEv();}
  var i=document.getElementById('srchIn');
  if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}
}
function clrSrch(){srch='';render();}

function buildDetail(e){
  var s=sgOf(e.sg);
  var pct=Math.round((e.st/totSg(e.sg))*100);
  var hasPre=e.pre&&e.pre.length>0;
  return'<div class="pane">'
    +'<button class="back" data-back="1"><i class="ti ti-arrow-left" style="font-size:13px"></i>Back to list</button>'
    +'<div class="prog-bar-wrap">'
      +'<span class="lbadge" style="background:'+s.c+'">'+s.lbl+'</span>'
      +'<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%;background:'+s.c+'"></div></div>'
      +'<span class="prog-lbl">Step '+e.st+' of '+totSg(e.sg)+'</span>'
    +'</div>'
    +'<div class="det-card" style="border-top:3px solid '+s.c+'">'
      +'<div class="det-head" style="background:linear-gradient(135deg,'+s.c+'18 0%,transparent 60%)">'
        +'<div class="det-title">'+e.ev+'</div>'
      +'</div>'
      +'<div class="det-body">'
        +(hasPre?'<div class="signal pre"><div class="signal-ttl"><i class="ti ti-alert-triangle"></i>Before you trigger this</div><ul>'+e.pre.map(function(p){return'<li>'+p+'</li>';}).join('')+'</ul></div>':'')
        +'<div class="click-block" style="background:'+s.c+'0D;border-color:'+s.c+'50"><div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:'+s.c+';border-radius:0"></div><div class="click-block-lbl"><i class="ti ti-cursor-text" style="font-size:11px;color:'+s.c+'"></i><span style="color:'+s.c+'">Where to click</span></div><div class="click-block-val" style="color:'+s.c+'">'+e.fi+'</div></div>'
        +'<div class="iblock"><div class="iblock-lbl">Action</div><div style="margin-top:4px">'+aLbl(e)+'</div></div>'
        +'<div class="det-divider"></div>'
        +'<div class="signal go"><div class="signal-ttl"><i class="ti ti-bolt"></i>What Monday will do</div>'+e.au+'</div>'
        +'<div class="signal nxt"><div class="signal-ttl"><i class="ti ti-arrow-right"></i>What\'s next</div>'+e.nx+'</div>'
        +'<div class="det-divider"></div>'
        +'<div class="igrid">'
          +'<div class="iblock" style="margin-bottom:0"><div class="iblock-lbl">Who gets notified</div><div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:1px">'+nChips(e.no)+'</div></div>'
          +'<div class="iblock" style="margin-bottom:0"><div class="iblock-lbl">Date stamped</div><div class="iblock-val" style="margin-top:3px;font-size:12px;font-family:var(--mono)">'+(e.ds||'None')+'</div></div>'
        +'</div>'
        +'<div class="flag-row" style="margin-top:8px">'
          +'<span class="flag" style="'+(e.em?'background:#F0FDF4;border-color:#86EFAC;color:#14532D':'background:var(--s2);border-color:var(--bd);color:var(--t4)')+'"><i class="ti ti-mail" style="font-size:12px"></i>Client email: '+(e.em?'Yes':'No')+'</span>'
          +'<span class="flag" style="'+(e.ds?'background:#EFF6FF;border-color:#93C5FD;color:#1E3A5F':'background:var(--s2);border-color:var(--bd);color:var(--t4)')+'"><i class="ti ti-calendar" style="font-size:12px"></i>Date stamped: '+(e.ds?'Yes':'No')+'</span>'
          +(e.ft==='column'?'<span class="flag" style="background:#FFF7ED;border-color:#FED7AA;color:#7C2D12"><i class="ti ti-database" style="font-size:12px"></i>Enter data first — no automation triggered</span>':'')
        +'</div>'
        +'<div class="det-divider"></div>'
        +'<div class="signal wrn" style="margin-bottom:0"><div class="signal-ttl"><i class="ti ti-alert-circle"></i>Common mistake to avoid</div>'+e.mi+'</div>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function buildWH(){
  var matches=whFiltered();var q=wh.trim();var res='';
  if(q.length>=2&&matches.length===0){
    res='<div class="empty"><i class="ti ti-mood-confuzed"></i>No matching events. Try a synonym — "consult" for consultation, "becky" for RYP events, "r&s" for signing.</div>';
  }else{
    res=matches.map(function(e){
      var s=sgOf(e.sg);var hasPre=e.pre&&e.pre.length>0;
      return'<div class="wh-result" style="border-top-color:'+s.c+'">'
        +'<div class="wh-result-hdr"><span class="lbadge" style="background:'+s.c+'">'+s.lbl+'</span><span style="font-size:13px;font-weight:600;flex:1;color:var(--t1);letter-spacing:-.015em">'+e.ev+'</span></div>'
        +(hasPre?'<div class="signal pre" style="margin-bottom:8px"><div class="signal-ttl"><i class="ti ti-alert-triangle"></i>Before you trigger</div><ul>'+e.pre.map(function(p){return'<li>'+p+'</li>';}).join('')+'</ul></div>':'')
        +'<div class="signal go" style="margin-bottom:8px"><div class="signal-ttl"><i class="ti ti-bolt"></i>What Monday will do</div>'+e.au+'</div>'
        +'<div class="signal nxt" style="margin-bottom:8px"><div class="signal-ttl"><i class="ti ti-arrow-right"></i>What\'s next</div>'+e.nx+'</div>'
        +'<button class="wh-peek-btn" data-ev="'+e.id+'"><i class="ti ti-external-link" style="font-size:12px"></i>Full details</button>'
      +'</div>';
    }).join('');
  }
  return'<div class="pane">'
    +'<div class="wh-hero">'
      +'<div class="wh-hero-ttl"><i class="ti ti-timeline-event"></i>What just happened?</div>'
      +'<div class="wh-inp-wrap"><i class="ti ti-search" style="color:var(--t3);font-size:15px"></i>'
        +'<input type="text" id="whIn" placeholder="Type freely — \'fee agt\', \'becky\', \'signed\', \'retainer paid\', \'r&s\'…" value="'+escH(wh)+'" oninput="onWH(this.value)">'
        +(wh?'<button class="srch-clear" onclick="clrWH()"><i class="ti ti-x"></i></button>':'')
      +'</div>'
      +'<div class="wh-hint">'+(q.length>=2?'<strong>'+matches.length+'</strong> matching event'+(matches.length===1?'':'s')+' — results ranked by relevance':'Smart search: understands abbreviations, staff names, and synonyms. Results ranked by relevance.')+'</div>'
      +(!wh?'<div class="wh-suggestions">'+WH_SUGGESTIONS.map(function(s){return'<button class="wh-sug" data-whs="'+escH(s)+'">'+s+'</button>';}).join('')+'</div>':'')
    +'</div>'
    +res
  +'</div>';
}

function onWH(v){wh=v;document.getElementById('PANE').innerHTML=buildWH();attachEv();var i=document.getElementById('whIn');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}}
function clrWH(){wh='';document.getElementById('PANE').innerHTML=buildWH();attachEv();}

function buildQR(){
  var h='<div class="pane"><div class="info-note"><i class="ti ti-info-circle" style="font-size:14px"></i>Every event in sequence. Click any row to open the full detail view.</div>';
  SG.forEach(function(s){
    var items=EV.filter(function(e){return e.sg===s.id;});
    if(!items.length)return;
    h+='<div class="qr-stage">'
      +'<div class="qr-hdr" style="background:'+s.c+'"><i class="ti ti-arrow-right" style="font-size:13px"></i>'+s.lbl+'<span style="opacity:.7;font-weight:400;font-size:11px;margin-left:5px">'+items.length+' events</span></div>';
    items.forEach(function(e){
      var ft=ftOf(e.ft);var hasPre=e.pre&&e.pre.length>0;
      h+='<button class="qr-row" data-ev="'+e.id+'" style="border-left-color:'+s.c+'">'
        +'<span class="qr-n" style="background:'+s.c+'">'+e.st+'</span>'
        +'<span class="qr-ev">'+e.ev+'</span>'
        +(hasPre?'<span class="ev-pre" style="font-size:10px">prereqs</span>':'')
        +'<span class="lbadge" style="background:'+ft.bg+'">'+ft.l+'</span>'
      +'</button>';
    });
    h+='</div>';
  });
  return h+'</div>';
}

function buildConcepts(){
  return'<div class="pane">'
    +CONCEPTS.map(function(c){
      return'<div class="concept">'
        +'<div class="concept-n">'+c.n+'</div>'
        +'<div class="concept-ttl">'+c.ttl+'</div>'
        +'<div class="concept-def">'+c.def+'</div>'
        +'<div class="concept-ex"><div class="concept-ex-lbl">Example</div><div class="concept-ex-val">'+c.ex+'</div></div>'
      +'</div>';
    }).join('')
  +'</div>';
}

function buildRules(){
  return'<div class="pane">'
    +RULES.map(function(r,i){
      return'<div class="rule">'
        +'<div class="rule-n">'+(i+1)+'</div>'
        +'<div><div class="rule-t">'+r.t+'</div><div class="rule-d">'+r.d+'</div></div>'
      +'</div>';
    }).join('')
  +'</div>';
}

function buildMistakes(){
  var by={};
  EV.forEach(function(e){if(e.mi&&e.mi!=='N/A'){if(!by[e.sg])by[e.sg]=[];by[e.sg].push(e);}});
  var h='<div class="pane">';
  SG.forEach(function(s){
    var items=by[s.id]||[];
    if(!items.length)return;
    h+='<div class="sg-hdr"><div class="sg-dot" style="background:'+s.c+'"></div><div class="sg-lbl" style="color:'+s.c+'">'+s.lbl+'</div><div class="sg-ct">'+items.length+' items</div><div class="sg-line"></div></div>';
    items.forEach(function(e){
      h+='<div class="mk" style="border-left-color:'+s.c+'">'
        +'<div class="mk-ev">'+e.ev+'</div>'
        +'<div class="mk-tx">'+e.mi+'</div>'
      +'</div>';
    });
  });
  return h+'</div>';
}

function buildTS(){
  return'<div class="pane">'
    +TS.map(function(t){
      return'<div class="ts">'
        +'<div class="ts-p"><i class="ti ti-circle-x" style="font-size:15px;color:#B91C1C"></i>'+t.p+'</div>'
        +'<div class="ts-g">'
          +'<div class="ts-c"><div class="ts-cl">First check</div><div class="ts-cv">'+t.f+'</div></div>'
          +'<div class="ts-c"><div class="ts-cl">Next step</div><div class="ts-cv">'+t.n+'</div></div>'
        +'</div>'
      +'</div>';
    }).join('')
  +'</div>';
}

/* ── Event delegation ── */
function attachEv(){
  var bk=document.querySelector('[data-back]');
  if(bk)bk.onclick=function(){selId=null;render();};
}

document.addEventListener('click',function(ev){
  var btn=ev.target.closest('[data-sg],[data-role],[data-ev],[data-back],[data-whs]');
  if(!btn)return;
  if(btn.dataset.sg!==undefined){setSg(btn.dataset.sg);return;}
  if(btn.dataset.role!==undefined){setRole(btn.dataset.role);return;}
  if(btn.dataset.ev!==undefined){selId=parseInt(btn.dataset.ev);tab='nav';render();return;}
  if(btn.dataset.back!==undefined){selId=null;render();return;}
  if(btn.dataset.whs!==undefined){wh=btn.dataset.whs;tab='wh';document.getElementById('PANE').innerHTML=buildWH();attachEv();return;}
});

render();
</script>
</body>
</html>
